services:
  postgres:
    image: postgres:17-alpine
    container_name: feedback_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-feedback_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-feedback_pass}
      POSTGRES_DB: ${POSTGRES_DB:-feedback_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-feedback_user} -d ${POSTGRES_DB:-feedback_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - feedback_network

  redis:
    image: redis:8-alpine
    container_name: feedback_redis
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - feedback_network

  api:
    image: yashv97/acowale-feedback:api-latest
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: feedback_api
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-feedback_user}:${POSTGRES_PASSWORD:-feedback_pass}@postgres:5432/${POSTGRES_DB:-feedback_db}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-supersecretjwtkey_changeme_in_production}
      PORT: 5000
      NODE_ENV: production
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    networks:
      - feedback_network

  web:
    image: yashv97/acowale-feedback:web-latest
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: feedback_web
    ports:
      - "3000:80"
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:5000}
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - feedback_network

volumes:
  postgres_data:
  redis_data:

networks:
  feedback_network:
    driver: bridge
